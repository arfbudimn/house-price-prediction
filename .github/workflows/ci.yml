name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      # --- OPTIMASI: Setup Docker Buildx ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 1. Build & Push housing-api ---
      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/housing-api:latest
            ${{ steps.login-ecr.outputs.registry }}/housing-api:${{ github.sha }}
          # Magic: Menggunakan cache GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- 2. Build & Push housing-streamlit ---
      - name: Build and Push Streamlit
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/housing-streamlit:latest
            ${{ steps.login-ecr.outputs.registry }}/housing-streamlit:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- 3. Deploy to ECS ---
      - name: Deploy Services to ECS
        run: |
          aws ecs update-service --cluster housing-api-cluster-ecs --service service-housing-api --force-new-deployment
          aws ecs update-service --cluster housing-api-cluster-ecs --service service-housing-streamlit --force-new-deployment